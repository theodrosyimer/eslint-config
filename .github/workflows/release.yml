name: Release and Publish

on:
  workflow_run:
    workflows: ['Format']
    types: [completed]
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git User
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Upgrade to Latest NPM CLI
        run: npm install -g npm@latest

      - name: Verify NPM CLI for Trusted Publishing
        run: |
          npm_version=$(npm --version)
          echo "NPM CLI version: $npm_version"

          [ "$(printf '%s\n' '11.5.1' '$npm_version' | sort -V | head -n1)" = "11.5.1" ] && {
            echo "✅ NPM CLI $npm_version supports trusted publishing"
          } || {
            echo "❌ Installation of latest NPM failed or version insufficient for trusted publishing"
            echo "❌ Current version: $npm_version (required: 11.5.1+)"
            echo "❌ Try manually upgrading: npm install -g npm@latest"
            exit 1
          }

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release --ci

      - name: Publish
        run: pnpm publish --access public

      - name: Verify Provenance
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "✅ Package published with automatic provenance"
          echo "🔍 Verify at: https://npmjs.com/package/$PACKAGE_NAME"
